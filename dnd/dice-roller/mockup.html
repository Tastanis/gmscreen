<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller - Calculator Redesign Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #3a3028;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  :root {
    --dice-surface: #f4eadc;
    --dice-surface-strong: #e6d8c5;
    --dice-border: #c2ad90;
    --dice-text: #2f2417;
    --dice-muted: #5e4b36;
    --dice-accent: #8b6f4e;
    --dice-accent-strong: #6f5333;
    --dice-success: #3b6d42;
    --dice-danger: #8c3a2f;
    --dice-info: #2f586b;
    --dice-warning: #b28739;
  }

  .dice-modal {
    background: linear-gradient(135deg, #f2e8dc 0%, #e3d3c0 100%);
    color: var(--dice-text);
    border-radius: 8px;
    width: 380px;
    box-shadow: 0 8px 24px rgba(47, 36, 23, 0.3);
    display: flex;
    flex-direction: column;
    border: 1px solid var(--dice-border);
    overflow: hidden;
  }

  /* ── Header ── */
  .dice-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    background: var(--dice-surface-strong);
    border-bottom: 1px solid var(--dice-border);
    cursor: grab;
    user-select: none;
  }

  .dice-modal-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--dice-accent-strong);
  }

  .dice-modal-close {
    background: transparent;
    border: none;
    color: var(--dice-muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  /* ── Content ── */
  .dice-modal-content {
    padding: 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* ── Result Display (calculator screen) ── */
  .dice-result-screen {
    background: #2f2417;
    border: 2px solid var(--dice-accent-strong);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.2rem;
  }

  .dice-result-queue {
    font-family: 'Fira Code', 'Source Code Pro', monospace;
    font-size: 0.8rem;
    color: #c2ad90;
    min-height: 1.1rem;
    word-break: break-word;
  }

  .dice-result-queue--empty {
    opacity: 0.5;
  }

  .dice-result-total {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    color: #f4eadc;
    text-align: right;
    line-height: 1;
  }

  .dice-result-detail {
    font-size: 0.75rem;
    color: #a89278;
    font-family: 'Fira Code', 'Source Code Pro', monospace;
    text-align: right;
    line-height: 1.2;
  }

  /* ── Buttons shared ── */
  .dice-btn {
    padding: 0.55rem 0.5rem;
    border-radius: 5px;
    border: 1px solid var(--dice-border);
    background: var(--dice-surface-strong);
    color: var(--dice-text);
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .dice-btn:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  .dice-btn:active {
    transform: scale(0.97);
  }

  .dice-btn--accent {
    background: var(--dice-accent);
    border-color: var(--dice-accent-strong);
    color: #fdfaf5;
  }

  .dice-btn--accent:hover {
    background: var(--dice-accent-strong);
    border-color: var(--dice-accent-strong);
  }

  /* ── Primary Row: Power Roll ── */
  .dice-row-primary {
    display: flex;
    gap: 0.4rem;
  }

  .dice-btn--power {
    flex: 1;
    font-size: 1.05rem;
    padding: 0.75rem 0.5rem;
  }

  /* ── Edge / Bane Row ── */
  .dice-row-edge-bane {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
  }

  .dice-btn--edge {
    background: #dce8dc;
    color: var(--dice-success);
    border-color: var(--dice-success);
  }

  .dice-btn--edge:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  .dice-btn--bane {
    background: #f2d8d4;
    color: var(--dice-danger);
    border-color: var(--dice-danger);
  }

  .dice-btn--bane:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  /* ── Divider ── */
  .dice-divider {
    width: 100%;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(194,173,144,0.5) 0%, rgba(194,173,144,0.15) 100%);
    margin: 0.1rem 0;
  }

  /* ── Modifier Row ── */
  .dice-row-modifiers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
  }

  /* ── Dice Grid ── */
  .dice-row-dice {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.4rem;
  }

  /* ── Action Row: Roll + Clear ── */
  .dice-row-actions {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0.4rem;
    align-items: stretch;
  }

  .dice-btn--roll {
    background: #dce8dc;
    color: var(--dice-success);
    border-color: var(--dice-success);
    font-size: 0.9rem;
    padding: 0.6rem;
  }

  .dice-btn--roll:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  .dice-btn--clear {
    background: #f2d8d4;
    color: var(--dice-danger);
    border-color: var(--dice-danger);
    font-size: 0.9rem;
    padding: 0.6rem;
  }

  .dice-btn--clear:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  .dice-btn--advantage {
    background: var(--dice-surface);
    color: var(--dice-text);
    border-color: var(--dice-border);
    font-size: 0.7rem;
    padding: 0.4rem 0.6rem;
    white-space: nowrap;
  }

  .dice-btn--advantage.active {
    background: #f0e0c6;
    color: var(--dice-accent-strong);
    border-color: var(--dice-accent-strong);
  }

  /* ── Project Section ── */
  .dice-project-section {
    background: var(--dice-surface-strong);
    border: 1px solid var(--dice-border);
    border-radius: 5px;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .dice-project-section__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.4rem;
  }

  .dice-project-section__label {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dice-muted);
    font-weight: 700;
  }

  .dice-project-section__row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.4rem;
    align-items: stretch;
  }

  .dice-btn--project {
    background: #d8e3ed;
    color: var(--dice-info);
    border-color: var(--dice-info);
    font-size: 0.85rem;
    padding: 0.55rem 0.5rem;
  }

  .dice-btn--project:hover {
    background: var(--dice-surface);
    border-color: var(--dice-accent);
  }

  /* ── Day Counter (compact) ── */
  .dice-day-counter {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.35rem;
    background: var(--dice-surface);
    border: 1px solid var(--dice-border);
    border-radius: 5px;
  }

  .dice-day-counter__label {
    font-size: 0.6rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--dice-muted);
    font-weight: 700;
    white-space: nowrap;
  }

  .dice-day-counter__btn {
    border: 1px solid var(--dice-border);
    background: var(--dice-surface-strong);
    color: var(--dice-text);
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 3px;
    padding: 0.15rem 0.3rem;
    cursor: pointer;
    line-height: 1;
  }

  .dice-day-counter__value {
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--dice-text);
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    background: var(--dice-surface);
    min-width: 1.8rem;
    border: 1px solid var(--dice-border);
  }

  /* ── Label below mockup ── */
  .mockup-label {
    text-align: center;
    color: #a89278;
    font-size: 0.8rem;
    margin-top: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Interactive demo ── */
  .demo-result { display: none; }
  .demo-result.show { display: block; }

</style>
</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center;">
  <div class="dice-modal">

    <!-- Header -->
    <div class="dice-modal-header">
      <span class="dice-modal-title">Dice Roller</span>
      <button class="dice-modal-close">&times;</button>
    </div>

    <div class="dice-modal-content">

      <!-- ═══ RESULT SCREEN (Calculator Display) ═══ -->
      <div class="dice-result-screen">
        <div class="dice-result-queue dice-result-queue--empty" id="queueDisplay">No dice queued</div>
        <div class="dice-result-total" id="resultTotal">&mdash;</div>
        <div class="dice-result-detail" id="resultDetail"></div>
      </div>

      <!-- ═══ POWER ROLL (main button) ═══ -->
      <div class="dice-row-primary">
        <button class="dice-btn dice-btn--accent dice-btn--power" onclick="addDice('2d10')">Power Roll</button>
      </div>

      <!-- ═══ EDGE / BANE ═══ -->
      <div class="dice-row-edge-bane">
        <button class="dice-btn dice-btn--edge" onclick="addMod('+2', 'Edge')">Edge (+2)</button>
        <button class="dice-btn dice-btn--bane" onclick="addMod('-2', 'Bane')">Bane (-2)</button>
      </div>

      <div class="dice-divider"></div>

      <!-- ═══ MODIFIER BUTTONS ═══ -->
      <div class="dice-row-modifiers">
        <button class="dice-btn" onclick="addMod('-1')">-1</button>
        <button class="dice-btn" onclick="addMod('+1')">+1</button>
        <button class="dice-btn" onclick="addMod('+2')">+2</button>
      </div>

      <!-- ═══ DICE GRID ═══ -->
      <div class="dice-row-dice">
        <button class="dice-btn" onclick="addDice('1d2')">D2</button>
        <button class="dice-btn" onclick="addDice('1d4')">D4</button>
        <button class="dice-btn" onclick="addDice('1d6')">D6</button>
        <button class="dice-btn" onclick="addDice('1d8')">D8</button>
        <button class="dice-btn" onclick="addDice('1d10')">D10</button>
      </div>

      <div class="dice-divider"></div>

      <!-- ═══ ROLL / CLEAR / ADVANTAGE ═══ -->
      <div class="dice-row-actions">
        <button class="dice-btn dice-btn--roll" onclick="doRoll()">Roll</button>
        <button class="dice-btn dice-btn--clear" onclick="doClear()">Clear</button>
        <button class="dice-btn dice-btn--advantage" id="advBtn" onclick="toggleAdv()">Adv: Off</button>
      </div>

      <!-- ═══ PROJECT ROLL SECTION ═══ -->
      <div class="dice-project-section">
        <div class="dice-project-section__header">
          <span class="dice-project-section__label">Project Rolling</span>
          <div class="dice-day-counter">
            <span class="dice-day-counter__label">Days</span>
            <button class="dice-day-counter__btn" onclick="changeDays(-1)">&#9660;</button>
            <span class="dice-day-counter__value" id="dayValue">0</span>
            <button class="dice-day-counter__btn" onclick="changeDays(1)">&#9650;</button>
          </div>
        </div>
        <div class="dice-project-section__row">
          <button class="dice-btn dice-btn--project" onclick="alert('Opens project selection flow')">Project Roll</button>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /modal -->

  <div class="mockup-label">Calculator-style Redesign Mockup</div>
</div>

<script>
  // Simple interactive demo
  let queue = [];
  let advantage = false;
  let days = 0;

  function updateDisplay() {
    const qd = document.getElementById('queueDisplay');
    if (queue.length === 0) {
      qd.textContent = 'No dice queued';
      qd.classList.add('dice-result-queue--empty');
    } else {
      qd.textContent = queue.join(' + ').replace(/\+ -/g, '- ');
      qd.classList.remove('dice-result-queue--empty');
    }
  }

  function addDice(notation) {
    queue.push(notation);
    updateDisplay();
  }

  function addMod(mod, label) {
    queue.push(mod);
    updateDisplay();
  }

  function doRoll() {
    if (queue.length === 0) return;
    let total = 0;
    let parts = [];
    queue.forEach(item => {
      const diceMatch = item.match(/^(\d+)d(\d+)$/);
      if (diceMatch) {
        const count = parseInt(diceMatch[1]);
        const sides = parseInt(diceMatch[2]);
        let rolls = [];
        for (let i = 0; i < count; i++) {
          const r = Math.floor(Math.random() * sides) + 1;
          rolls.push(r);
          total += r;
        }
        parts.push(`${item} [${rolls.join(', ')}]`);
      } else {
        const val = parseInt(item);
        total += val;
        parts.push(item);
      }
    });

    if (advantage) {
      // Roll a second time and keep higher
      let total2 = 0;
      queue.forEach(item => {
        const diceMatch = item.match(/^(\d+)d(\d+)$/);
        if (diceMatch) {
          const count = parseInt(diceMatch[1]);
          const sides = parseInt(diceMatch[2]);
          for (let i = 0; i < count; i++) {
            total2 += Math.floor(Math.random() * sides) + 1;
          }
        } else {
          total2 += parseInt(item);
        }
      });
      const best = Math.max(total, total2);
      document.getElementById('resultTotal').textContent = best;
      document.getElementById('resultDetail').textContent = `Adv: ${total} vs ${total2} → kept ${best}`;
    } else {
      document.getElementById('resultTotal').textContent = total;
      document.getElementById('resultDetail').textContent = parts.join(' + ').replace(/\+ -/g, '- ');
    }
  }

  function doClear() {
    queue = [];
    updateDisplay();
    document.getElementById('resultTotal').textContent = '\u2014';
    document.getElementById('resultDetail').textContent = '';
  }

  function toggleAdv() {
    advantage = !advantage;
    const btn = document.getElementById('advBtn');
    btn.textContent = advantage ? 'Adv: On' : 'Adv: Off';
    btn.classList.toggle('active', advantage);
  }

  function changeDays(delta) {
    days = Math.max(0, days + delta);
    document.getElementById('dayValue').textContent = days;
  }
</script>

</body>
</html>
